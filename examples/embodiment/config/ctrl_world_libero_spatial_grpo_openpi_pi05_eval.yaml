defaults:
  - env/ctrl_world_libero_spatial@env.train
  - env/ctrl_world_libero_spatial@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor, env, rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "ctrl_world_libero_spatial_grpo_openpi_pi05_eval"
    logger_backends: ["tensorboard", "wandb"]

  max_epochs: 1000
  max_steps: -1

  only_eval: True
  val_check_interval: -1
  save_interval: 5

  resume_dir: null
  ckpt_path: "/mimer/NOBACKUP/groups/naiss2024-5-164/Hanzhi/RLinf/logs/20260316-140154-ctrl_world_libero_spatial_grpo_openpi_pi05-job6138760/ctrl_world_libero_spatial_grpo_openpi_pi05/checkpoints/global_step_4/actor/model_state_dict/full_weights.pt"

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 8
  reward_coef: 1.0
  rollout_epoch: 4
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 1

  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: True
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  # Kept for compatibility with env defaults that reference env.train paths.
  train:
    total_num_envs: 96
    group_size: ${algorithm.group_size}
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 120
    video_cfg:
      save_video: False
      fps: 7
    ctrl_world_cfg:
      num_inference_steps: 50
      policy_action_type: delta_eef
      policy_gripper_type: symmetric_11_to_01
    enable_offload: False

  eval:
    # 96 is divisible by env world size 6 under current placement (2-7) and stage_num=1.
    # Keep eval batch moderate to avoid OOM in Ctrl-World VAE encode during reset.
    total_num_envs: 96
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    group_size: 1
    is_eval: True
    use_fixed_reset_state_ids: True
    use_ordered_reset_state_ids: True
    video_cfg:
      save_video: True
      save_success_frame: True
      fps: 1
      video_base_dir: ${runner.logger.log_path}/video/eval
    ctrl_world_cfg:
      num_inference_steps: 50
      policy_action_type: delta_eef
      policy_gripper_type: symmetric_11_to_01
    enable_offload: False

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "/mimer/NOBACKUP/groups/naiss2024-5-164/Hanzhi/RLinf/models/RLinf-Pi05-LIBERO-SFT"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 1536
  seed: 42
  enable_offload: False

  model:
    model_path: "/mimer/NOBACKUP/groups/naiss2024-5-164/Hanzhi/RLinf/models/RLinf-Pi05-LIBERO-SFT"
    model_type: "openpi"
    num_action_chunks: ${env.train.ctrl_world_cfg.chunk}
    num_steps: 3

    openpi:
      config_name: "pi05_libero"
      num_images_in_input: 2

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False

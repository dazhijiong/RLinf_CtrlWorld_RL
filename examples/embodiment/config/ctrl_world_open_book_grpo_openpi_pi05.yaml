defaults:
  - experiment/ctrl_world_open_book_grpo_pi05@exp
  - env/ctrl_world_open_book@env.train
  - env/ctrl_world_open_book@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor, env, rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: ${exp.logging.experiment_name}
    logger_backends: ["tensorboard", "wandb"]

  max_epochs: ${exp.training.max_epochs}
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 1

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: ${exp.training.group_size}
  reward_coef: 1.0
  rollout_epoch: ${exp.training.rollout_epoch}
  eval_rollout_epoch: ${exp.evaluation.rollout_epoch}

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: ${exp.training.update_epoch}

  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: True
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: ${exp.training.total_num_envs}
    group_size: ${algorithm.group_size}
    max_episode_steps: ${exp.training.max_episode_steps}
    max_steps_per_rollout_epoch: ${exp.training.max_steps_per_rollout_epoch}
    auto_reset: False
    ignore_terminations: False
    ctrl_world_repo_path: ${exp.paths.ctrl_world_repo_path}
    ctrl_world_ckpt_path: ${exp.paths.ctrl_world_ckpt_path}
    initial_image_path: ${exp.paths.initial_image_path}
    ctrl_world_reward_model_path: ${exp.paths.reward_model_path}
    video_cfg:
      save_video: True
      fps: ${exp.rollout.video_fps}
      save_success_frame: True
    ctrl_world_cfg:
      num_inference_steps: ${exp.ctrl_world.num_inference_steps}
      decode_chunk_size: ${exp.ctrl_world.decode_chunk_size}
      frame_level_cond: ${exp.ctrl_world.frame_level_cond}
      his_cond_zero: ${exp.ctrl_world.his_cond_zero}
      policy_action_type: ${exp.ctrl_world.policy_action_type}
      policy_gripper_type: ${exp.ctrl_world.policy_gripper_type}
    enable_offload: True

  eval:
    total_num_envs: ${exp.evaluation.total_num_envs}
    auto_reset: True
    ignore_terminations: True
    ctrl_world_repo_path: ${exp.paths.ctrl_world_repo_path}
    ctrl_world_ckpt_path: ${exp.paths.ctrl_world_ckpt_path}
    initial_image_path: ${exp.paths.initial_image_path}
    ctrl_world_reward_model_path: ${exp.paths.reward_model_path}
    max_episode_steps: ${exp.evaluation.max_episode_steps}
    max_steps_per_rollout_epoch: ${exp.evaluation.max_steps_per_rollout_epoch}
    group_size: ${exp.evaluation.group_size}
    is_eval: True
    video_cfg:
      save_video: True
      fps: ${exp.rollout.video_fps}
      video_base_dir: ${runner.logger.log_path}/video/eval
      save_success_frame: True
    ctrl_world_cfg:
      num_inference_steps: ${exp.ctrl_world.num_inference_steps}
      decode_chunk_size: ${exp.ctrl_world.decode_chunk_size}
      frame_level_cond: ${exp.ctrl_world.frame_level_cond}
      his_cond_zero: ${exp.ctrl_world.his_cond_zero}
      policy_action_type: ${exp.ctrl_world.policy_action_type}
      policy_gripper_type: ${exp.ctrl_world.policy_gripper_type}
    enable_offload: True

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: True
  pipeline_stage_num: 1
  enable_cuda_graph: False

  model:
    model_path: ${exp.paths.policy_model_path}
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: ${exp.optim.micro_batch_size}
  global_batch_size: ${exp.optim.global_batch_size}
  seed: ${exp.optim.seed}
  enable_offload: True

  model:
    model_path: ${exp.paths.policy_model_path}
    model_type: "openpi"
    num_action_chunks: ${env.train.ctrl_world_cfg.chunk}
    num_steps: ${exp.optim.num_steps}

    openpi:
      config_name: "pi05_book"
      num_images_in_input: 3
      add_libero_prompt_prefix: False

  optim:
    lr: ${exp.optim.lr}
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: ${exp.optim.weight_decay}
    clip_grad: ${exp.optim.clip_grad}

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    cpu_offload: True
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False

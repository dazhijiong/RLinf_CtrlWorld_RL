logging:
  experiment_name: "ctrl_world_libero_spatial_success_fm_openpi_pi05"

cluster:
  num_nodes: 2
  component_placement:
    env_rollout: "2-7"
    actor: "0-1"

paths:
  ctrl_world_repo_path: "/mimer/NOBACKUP/groups/naiss2024-5-164/Hanzhi/Ctrl-World"
  ctrl_world_ckpt_path: "/mimer/NOBACKUP/groups/naiss2024-5-164/Hanzhi/Ctrl-World/model_ckpt/doird_subset/checkpoint-10000.pt"
  initial_image_path: "/mimer/NOBACKUP/groups/naiss2024-5-164/Hanzhi/RLinf/datasets/lerobot_libero_spatial_image"
  reward_model_path: "/mimer/NOBACKUP/groups/naiss2024-5-164/Hanzhi/RLinf/models/RLinf-OpenSora-LIBERO-Spatial/resnet_rm.pth"
  policy_model_path: "/mimer/NOBACKUP/groups/naiss2024-5-164/Hanzhi/RLinf/models/pi05_libero_sft_train20_step2000_local"

training:
  max_epochs: 1000
  total_num_envs: 96
  group_size: 1
  max_episode_steps: 240
  max_steps_per_rollout_epoch: 240
  rollout_epoch: 1
  update_epoch: 1
  truncate_after_first_success: True

evaluation:
  total_num_envs: 496
  group_size: 1
  max_episode_steps: 240
  max_steps_per_rollout_epoch: 240
  rollout_epoch: 1

replay_buffer:
  cache_size: 2000
  min_buffer_size: 4
  sample_window_size: 2000

rollout:
  video_fps: 7

ctrl_world:
  num_inference_steps: 50
  decode_chunk_size: 12
  frame_level_cond: True
  his_cond_zero: False
  policy_action_type: delta_eef
  policy_gripper_type: passthrough

optim:
  micro_batch_size: 32
  global_batch_size: 1536
  seed: 42
  num_steps: 3
  lr: 5.0e-6
  weight_decay: 0.01
  clip_grad: 1.0

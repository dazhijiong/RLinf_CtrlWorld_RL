defaults:
  - env/ctrl_world_libero_spatial@env.train
  - env/ctrl_world_libero_spatial@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    env, rollout: 2-7
    actor: 0-1

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "ctrl_world_libero_spatial_grpo_openpi_pi05"
    logger_backends: ["tensorboard", "wandb"]

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 1

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 16
  reward_coef: 1.0
  rollout_epoch: 4
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 1

  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: True
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 96
    group_size: ${algorithm.group_size}
    ctrl_world_ckpt_path: "/mimer/NOBACKUP/groups/naiss2024-5-164/Hanzhi/Ctrl-World/model_ckpt/doird_subset/checkpoint-10000.pt"
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 120
    video_cfg:
      save_video: False
      fps: 7
    ctrl_world_cfg:
      num_inference_steps: 50
      decode_chunk_size: 12
      frame_level_cond: True
      his_cond_zero: False
      policy_action_type: delta_eef
      policy_gripper_type: passthrough
    enable_offload: False

  eval:
    total_num_envs: 496
    auto_reset: True
    ignore_terminations: True
    ctrl_world_ckpt_path: "/mimer/NOBACKUP/groups/naiss2024-5-164/Hanzhi/Ctrl-World/model_ckpt/doird_subset/checkpoint-10000.pt"
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    group_size: 1
    is_eval: True
    video_cfg:
      save_video: True
      fps: 7
      video_base_dir: ${runner.logger.log_path}/video/eval
    ctrl_world_cfg:
      policy_action_type: delta_eef
      policy_gripper_type: passthrough
    enable_offload: False

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1
  enable_cuda_graph: False

  model:
    model_path: "/mimer/NOBACKUP/groups/naiss2024-5-164/Hanzhi/RLinf/models/pi05_libero_sft_train20_step2000_local"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 1536
  seed: 42
  enable_offload: False

  model:
    model_path: "/mimer/NOBACKUP/groups/naiss2024-5-164/Hanzhi/RLinf/models/pi05_libero_sft_train20_step2000_local"
    model_type: "openpi"
    # Keep action chunk aligned with env.train.ctrl_world_cfg.chunk (Ctrl-World default 5)
    num_action_chunks: ${env.train.ctrl_world_cfg.chunk}
    num_steps: 3

    openpi:
      # Use LIBERO dataconfig and image count for the FM-aligned local SFT model.
      config_name: "pi05_libero"
      num_images_in_input: 2

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
